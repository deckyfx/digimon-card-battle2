<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.8"/>
    </filter>
  </defs>
  <!-- Floppy disk -->
  <g filter="url(#shadow)">
    <!-- Main body -->
    <rect
      x="4" y="6" width="24" height="23"
      fill="#ffffff"
      stroke="#000000"
      stroke-width="1.5"
      stroke-linejoin="round"
      rx="1.5"/>
    <!-- Center circular hub -->
    <circle
      cx="16" cy="19"
      r="4"
      fill="#ffffff"
      stroke="#000000"
      stroke-width="1.5"/>
    <!-- Inner hub circle -->
    <circle
      cx="16" cy="19"
      r="2"
      fill="#000000"/>
    <!-- Top cover -->
    <rect
      x="9" y="5.5" width="14" height="5"
      fill="none"
      stroke="#000000"
      stroke-width="1"
      stroke-linejoin="round"
      rx="1"/>
  </g>
</svg>
