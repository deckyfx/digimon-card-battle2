<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Simple Question Mark for Rare specialty -->
  <g>
    <!-- Question mark curve -->
    <path d="M 10 11 Q 10 7 13 5 Q 16 4 19 5 Q 22 7 22 11 Q 22 14 19 15 Q 16 16 16 18 L 16 20"
          stroke="#eab308"
          stroke-width="4.5"
          stroke-linecap="round"
          fill="none"/>

    <!-- Question mark dot -->
    <circle cx="16" cy="24" r="3"
            fill="#eab308"/>

    <!-- Outer glow -->
    <g opacity="0.3">
      <path d="M 10 11 Q 10 7 13 5 Q 16 4 19 5 Q 22 7 22 11 Q 22 14 19 15 Q 16 16 16 18 L 16 20"
            stroke="#eab308"
            stroke-width="1"
            fill="none"/>
      <circle cx="16" cy="24" r="3"
              fill="#eab308"/>
    </g>
  </g>
</svg>
